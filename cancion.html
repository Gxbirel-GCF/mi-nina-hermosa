<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Canción ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .reproductor {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            width: 320px;
        }

        /* El disco/icono giratorio */
        .disco-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }

        .disco {
            width: 100%;
            height: 100%;
            background: #333; /* Color de fondo si no carga la imagen */
            background-image: url('amol.jpeg'); /* Puedes poner la misma foto o el cover del album */
            background-size: cover;
            border-radius: 50%;
            border: 10px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            animation: girar 5s linear infinite;
            animation-play-state: paused; /* Se activa al sonar */
        }

        .disco::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            border: 5px solid rgba(0,0,0,0.1);
        }

        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        .controles {
            font-size: 2rem;
            color: #ff4d79;
            cursor: pointer;
            transition: 0.3s;
        }

        .controles:hover {
            transform: scale(1.1);
        }

        .btn-volver {
            margin-top: 30px;
            display: inline-block;
            text-decoration: none;
            color: #fff;
            font-size: 0.8rem;
            background: rgba(216, 27, 96, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="reproductor">
        <h1>Nuestra Canción</h1>
        <p>Esa que me hace pensar en ti...</p>

        <div class="disco-container">
            <div class="disco" id="vinilo"></div>
        </div>

        <div class="controles" id="playBtn" onclick="toggleMusic()">
            ▶️
        </div>

        <!-- REEMPLAZA ESTE ENLACE CON TU CANCIÓN -->
        <audio id="cancion" loop>
            <source src="ssstik.io_1778484770943.mp3" type="audio/mpeg">
        </audio>

        <br>
        <a href="index.html" class="btn-volver">⬅ Volver a la carta</a>
    </div>

    <script>
        const cancion = document.getElementById('cancion');
        const vinilo = document.getElementById('vinilo');
        const playBtn = document.getElementById('playBtn');

        function toggleMusic() {
            if (cancion.paused) {
                cancion.play();
                vinilo.style.animationPlayState = 'running';
                playBtn.innerHTML = '⏸️';
            } else {
                cancion.pause();
                vinilo.style.animationPlayState = 'paused';
                playBtn.innerHTML = '▶️';
            }
        }

        // Iniciar automáticamente si es posible
        window.onload = () => {
            // Algunos navegadores bloquean el autoplay
            setTimeout(() => {
                toggleMusic();
            }, 1000);
        }
    </script>
</body>
</html>
