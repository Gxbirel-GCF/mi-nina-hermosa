<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Niña ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fce4ec;
            --color-card: #ffffff;
            --color-accent: #ff4081;
            --color-text: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #fce4ec, #f8bbd0);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* Corazones flotantes */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            color: var(--color-accent);
            opacity: 0.6;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Contenedor de la carta */
        .card-container {
            position: relative;
            width: 320px;
            height: 450px;
            perspective: 1500px;
            cursor: pointer;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-radius: 15px;
        }

        .card-container.open .card {
            transform: rotateY(-160deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid #fff;
        }

        /* Frontal */
        .card-front {
            background: var(--color-accent);
            color: white;
            z-index: 2;
        }

        .card-front .heart-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .card-front h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            margin: 0;
        }

        /* Trasera (Mensaje) */
        .card-back {
            background: var(--color-card);
            color: var(--color-text);
            transform: rotateY(180deg);
            text-align: center;
            background-image: radial-gradient(#ff4081 0.5px, transparent 0.5px);
            background-size: 20px 20px; /* Fondo de puntos sutil */
        }

        .card-back h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--color-accent);
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .card-back p {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #d81b60;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <!-- Elemento de Audio -->
    <audio id="musica" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/And-So-It-Begins-Inspired-By-Crush-Sometimes.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>

    <div class="hearts-container" id="hearts"></div>

    <div class="card-container" onclick="toggleCard()">
        <div class="card">
            <div class="card-front">
                <div class="heart-icon">✉️</div>
                <h1>Para Ti</h1>
                <p style="margin-top: 20px; opacity: 0.8;">Haz clic para abrir</p>
            </div>
            
            <div class="card-back">
                <h2>¡Eres especial!</h2>
                <p>
                    Desde que llegaste a mi vida, todo es más brillante. 
                    Gracias por ser mi apoyo, mi alegría y mi amor.
                </p>
                <p style="font-family: 'Dancing Script'; font-size: 1.8rem; margin-top: 25px; color: #ff4081;">
                    Te amo infinitamente ❤️
                </p>
            </div>
        </div>
        <div class="hint">Toca la carta para la sorpresa</div>
    </div>

    <script>
        let musicStarted = false;
        const musica = document.getElementById('musica');

        function toggleCard() {
            const container = document.querySelector('.card-container');
            container.classList.toggle('open');

            // Reproducir música al primer clic
            if (!musicStarted) {
                musica.play().catch(error => {
                    console.log("El navegador bloqueó el audio inicial. Necesita interacción.");
                });
                musicStarted = true;
            }
        }

        // Generador de corazones
        function createHeart() {
            const heartsContainer = document.getElementById('hearts');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 20 + 10;
            heart.style.fontSize = size + 'px';
            
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + 's';
            
            heartsContainer.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, duration * 1000);
        }

        setInterval(createHeart, 400);
    </script>
</body>
</html>
