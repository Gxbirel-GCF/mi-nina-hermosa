<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Universo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,100,200,0.8), 0 0 20px rgba(255,100,200,0.5);
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-style: italic;
            letter-spacing: 5px;
            opacity: 0.9;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        p {
            font-size: 1.2rem;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* Control de música */
        #music-control {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 20px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Eres mi universo</h1>
        <p>CADA ESTRELLA DE MI GALAXIA ES UN TE AMO PARA TI MI NIÑA</p>
    </div>

    <!-- Icono de música -->
    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <!-- Elemento de Audio -->
    <audio id="musicaGalaxia" loop>
        <source src="luna.mp3" type="audio/mpeg">
        Tu navegador no soporta el audio.
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Manejo de Música ---
        const audio = document.getElementById('musicaGalaxia');
        let musicPlaying = false;

        window.toggleMusic = () => {
            if (audio.paused) {
                audio.play();
                document.getElementById('music-control').innerHTML = '🎶';
            } else {
                audio.pause();
                document.getElementById('music-control').innerHTML = '🔇';
            }
        };

        // Iniciar música al primer toque/interacción con la galaxia
        window.addEventListener('mousedown', () => {
            if(!musicPlaying) {
                audio.play();
                musicPlaying = true;
            }
        });

        // --- Configuración Inicial Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;
        camera.position.y = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Generación de la Galaxia ---
        const parameters = {
            count: 70000,
            size: 0.012,
            radius: 5,
            branches: 5,
            spin: 1.5,
            randomness: 0.3,
            randomnessPower: 4,
            insideColor: '#ff80ab', // Color más rosado para temática romántica
            outsideColor: '#3f51b5'  // Azul profundo
        };

        let geometry = null;
        let material = null;
        let points = null;

        const generateGalaxy = () => {
            if(points !== null) {
                geometry.dispose();
                material.dispose();
                scene.remove(points);
            }

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors = new Float32Array(parameters.count * 3);

            const colorInside = new THREE.Color(parameters.insideColor);
            const colorOutside = new THREE.Color(parameters.outsideColor);

            for(let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                const radius = Math.random() * parameters.radius;
                const spinAngle = radius * parameters.spin;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;

                const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;

                positions[i3    ] = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                const mixedColor = colorInside.clone();
                mixedColor.lerp(colorOutside, radius / parameters.radius);

                colors[i3    ] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            material = new THREE.PointsMaterial({
                size: parameters.size,
                sizeAttenuation: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                vertexColors: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        };

        generateGalaxy();

        // --- Animación ---
        const clock = new THREE.Clock();

        const animate = () => {
            const elapsedTime = clock.getElapsedTime();
            if (points) points.rotation.y = elapsedTime * 0.05;

            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        };

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
