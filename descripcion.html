<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Amor me hace Florecer 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-vacio: #ffffff;
            --color-lleno: #ff4d79;
            --fondo: #fff0f3;
            --tallo: #81c784;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #fff0f3, #ffebee);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .instrucciones {
            text-align: center;
            margin-bottom: 50px;
            color: #d81b60;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* Contenedor del Corazón */
        .heart-container {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        .heart-container:active { transform: scale(0.9); }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(216, 27, 96, 0.2));
        }

        /* Llenado del corazón */
        .fill-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: var(--color-lleno);
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            clip-path: path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");
        }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 1.4rem;
            color: #d81b60;
            z-index: 11;
            pointer-events: none;
        }

        /* JARDÍN DE FLORES ANIMADAS */
        #jardin {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .flor-tallo {
            position: absolute;
            bottom: -100px; /* Empiezan fuera */
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: bottom 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .flor-cabeza {
            font-size: 2.5rem;
            animation: balanceo 3s infinite ease-in-out;
        }

        .tallo-verde {
            width: 4px;
            height: 150px;
            background: linear-gradient(to top, #4caf50, #81c784);
            border-radius: 2px;
        }

        @keyframes balanceo {
            0%, 100% { transform: rotate(-5deg) translateX(-2px); }
            50% { transform: rotate(5deg) translateX(2px); }
        }

        /* Mensaje final */
        .mensaje-final {
            position: absolute;
            top: 20%;
            opacity: 0;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #d81b60;
            text-align: center;
            transition: 2s;
            z-index: 10;
        }

        .mensaje-final.show { opacity: 1; transform: translateY(20px); }
    </style>
</head>
<body>

    <div class="instrucciones" id="instrucciones">
        <h1>Toca el corazón mi niña hermosa❤️</h1>
        <p>Mi amor florece por ti mi niña🥺</p>
    </div>

    <div class="mensaje-final" id="mensaje-final">
        ¡Haces que todo mi mundo cambie solo con verte<br> aun que sea una sola vez! <br> Te amo como no te imaginas mi niña❤️
    </div>

    <div class="heart-container" onclick="llenar()">
        <div class="percentage" id="percent">0%</div>
        <div class="fill-overlay" id="fill"></div>
        <svg viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="none" stroke="#ff4d79" stroke-width="0.5"/>
        </svg>
    </div>

    <div id="jardin"></div>

    <script>
        let progreso = 0;
        const fill = document.getElementById('fill');
        const percentTxt = document.getElementById('percent');
        const jardin = document.getElementById('jardin');
        const mensajeFinal = document.getElementById('mensaje-final');
        const instrucciones = document.getElementById('instrucciones');
        let finalizado = false;

        const tiposFlores = ['🌸', '🌹', '🌺', '🌻', '🌷', '🌼', '🏵️'];

        function llenar() {
            if (finalizado) return;

            progreso += 10;
            if (progreso > 100) progreso = 100;

            fill.style.height = progreso + '%';
            percentTxt.innerText = progreso + '%';

            // Crear una flor aleatoria que brota un poco cada vez que toca
            crearFlorIndividual();

            if (progreso === 100) {
                finalizado = true;
                iniciarGranFloracion();
            }
        }

        function crearFlorIndividual() {
            const florContainer = document.createElement('div');
            florContainer.className = 'flor-tallo';
            
            // Posición horizontal aleatoria
            florContainer.style.left = Math.random() * 90 + 'vw';
            
            // Altura de tallo aleatoria
            const alturaTallo = Math.random() * 100 + 50;
            
            florContainer.innerHTML = `
                <div class="flor-cabeza">${tiposFlores[Math.floor(Math.random() * tiposFlores.length)]}</div>
                <div class="tallo-verde" style="height: ${alturaTallo}px"></div>
            `;

            jardin.appendChild(florContainer);

            // Pequeño delay para activar la animación de subida
            setTimeout(() => {
                florContainer.style.bottom = '0px';
            }, 50);
        }

        function iniciarGranFloracion() {
            percentTxt.style.display = 'none';
            instrucciones.style.opacity = '0';
            mensajeFinal.classList.add('show');

            // Crear muchas flores rápidamente para llenar el jardín
            let contador = 0;
            const intervalo = setInterval(() => {
                crearFlorIndividual();
                contador++;
                if (contador > 30) clearInterval(intervalo);
            }, 150);
        }
    </script>
</body>
</html>
