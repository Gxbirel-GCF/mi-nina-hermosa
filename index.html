<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi niña hermosa ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    z-index:10;
    color:white;
    padding:20px;
}

h1{
    font-size:2.5rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    margin-top:20px;
    display:none;
    animation: fadeIn 2s;
}

button{
    background:white;
    color:#ff4d79;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:1.1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:absolute;
    color:rgba(255,255,255,0.7);
    animation: float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>
<body>

<div class="container">
    <h1>Para mi niña hermosa ❤️</h1>

    <button onclick="mostrarMensaje()">
        Toca aquí 💌
    </button>

    <p id="mensaje">
        No sé cómo explicarlo, pero desde que llegaste a mi vida
        todo se siente más bonito ❤️ <br><br>
        Gracias por hacerme sonreír, por estar conmigo
        y por ser una persona tan especial para mí. <br><br>
        Mi niña hermosa, te quiero muchísimo 💖
    </p>

    <br><br>

    <audio id="musica" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
function mostrarMensaje(){
    document.getElementById("mensaje").style.display = "block";
    document.getElementById("musica").play();
}

function crearCorazon(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(crearCorazon,300);
</script>

</body>
</html>
