<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para La Niña Mas Hermosa🥺❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#8e2de2,#ff6fd8);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.container{
z-index:2;
padding:20px;
max-width:350px;
}

.carta{
font-size:100px;
cursor:pointer;
animation:latido 1.2s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.oculto{
display:none;
}

.foto{
width:240px;
height:240px;
object-fit:cover;
border-radius:40px;
border:4px solid white;
box-shadow:0 0 20px rgba(255,255,255,.5);
margin-bottom:20px;
}

h1{
margin-bottom:15px;
}

#mensaje{
font-size:18px;
line-height:1.5;
min-height:140px;
}

#contador{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.heart{
position:absolute;
font-size:25px;
animation:subir 6s linear infinite;
opacity:.8;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-10vh);
opacity:0;
}
}
</style>
</head>
<body>

<div class="container">

<div id="inicio">
<div class="carta" onclick="abrirCarta()">💌</div>
<h2>Toca la carta mi niña hermosa ❤️</h2>
</div>

<div id="contenido" class="oculto">
<img src="amol.jpeg" class="foto">

<h1>Para la niña mas bonita de todo mi universo🥺❤️</h1>

<p id="mensaje"></p>

<div id="contador"></div>

<audio id="musica" loop>
<source src="ssstik.io_1778484770943.mp3" type="audio/mpeg">
</audio>
</div>

</div>

<script>

const texto = `Hola mi niña Hermosa, quiero que sepas que apesar de todo lo que pase y pasara nada ni nadie cambiara lo que siento por ti,
puedo decir con todo mi corazon que en verdad quiero hacerte sentir comoda a mi lado y no dudes nunca de lo que siento por ti`;

let i = 0;

function escribirTexto(){
if(i < texto.length){
document.getElementById("mensaje").innerHTML += texto.charAt(i);
i++;
setTimeout(escribirTexto,45);
}
}

function abrirCarta(){
document.getElementById("inicio").style.display="none";
document.getElementById("contenido").classList.remove("oculto");

document.getElementById("musica").play();

escribirTexto();
actualizarContador();
}

function actualizarContador(){
const fechaInicio = new Date("2026-03-19");
const ahora = new Date();

const diferencia = ahora - fechaInicio;

const dias = Math.floor(diferencia / (1000*60*60*24));
const horas = Math.floor((diferencia / (1000*60*60)) % 24);
const minutos = Math.floor((diferencia / (1000*60)) % 60);

document.getElementById("contador").innerHTML =
`❤️ Llevamos juntos ${dias} días, ${horas} horas y ${minutos} minutos ❤️`;
}

setInterval(actualizarContador,1000);

function crearCorazon(){
const heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(crearCorazon,400);

</script>

</body>
</html>
